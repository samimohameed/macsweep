<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- macOS-style rounded square -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- soft inner highlight -->
  <ellipse cx="380" cy="300" rx="420" ry="260" fill="#ffffff" opacity="0.10"/>

  <!-- broom, tilted for a sweeping motion -->
  <g transform="rotate(38 512 512)">
    <!-- handle -->
    <rect x="487" y="130" width="50" height="380" rx="25" fill="#f8fafc"/>
    <!-- collar -->
    <rect x="462" y="490" width="100" height="56" rx="24" fill="#e2e8f0"/>
    <!-- brush head -->
    <path d="M 462 540
             C 430 560 400 640 385 750
             C 383 764 393 776 407 776
             L 617 776
             C 631 776 641 764 639 750
             C 624 640 594 560 562 540
             Z" fill="url(#brush)"/>
    <!-- bristle grooves -->
    <path d="M 462 590 C 452 640 444 700 438 756" stroke="#d97706" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M 512 585 L 512 756" stroke="#d97706" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M 562 590 C 572 640 580 700 586 756" stroke="#d97706" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>

  <!-- swept sparkles -->
  <g fill="#ffffff">
    <path d="M 700 260 l 16 44 44 16 -44 16 -16 44 -16 -44 -44 -16 44 -16 z"/>
    <path d="M 790 420 l 11 30 30 11 -30 11 -11 30 -11 -30 -30 -11 30 -11 z" opacity="0.85"/>
    <path d="M 660 430 l 8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z" opacity="0.7"/>
  </g>

  <!-- motion swoosh under the brush -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M 250 800 q 80 24 170 12" stroke-width="26"/>
    <path d="M 230 866 q 110 30 230 12" stroke-width="26" opacity="0.6"/>
  </g>
</svg>
