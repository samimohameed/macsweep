name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  safety-tests:
    name: Safety tests (macOS, Python ${{ matrix.python }})
    runs-on: macos-latest
    strategy:
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run safety tests
        run: python -m pytest tests/ -v
      - name: Read-only scan smoke test
        run: |
          python -m macsweep targets
          python -m macsweep scan
          python -m macsweep clean   # dry run by default — removes nothing
